<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const baselineOsc = audioCtx.createOscillator();
baselineOsc.type = 'sine';
baselineOsc.frequency.setValueAtTime(40, audioCtx.currentTime);

const baselineGain = audioCtx.createGain();
baselineGain.gain.setValueAtTime(0.02, audioCtx.currentTime);

const baselinePanner = audioCtx.createStereoPanner();
baselinePanner.pan.setValueAtTime(0, audioCtx.currentTime);

baselineOsc.connect(baselinePanner).connect(baselineGain).connect(audioCtx.destination);
baselineOsc.start();

const bufferSize = 2 * audioCtx.sampleRate;
const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
const output = noiseBuffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) {
    output[i] = (Math.random() * 2 - 1) * 0.5;
}
const noiseSource = audioCtx.createBufferSource();
noiseSource.buffer = noiseBuffer;
noiseSource.loop = true;

const noiseGain = audioCtx.createGain();
noiseGain.gain.setValueAtTime(0.01, audioCtx.currentTime);

const noiseFilter = audioCtx.createBiquadFilter();
noiseFilter.type = 'lowpass';
noiseFilter.frequency.setValueAtTime(1200, audioCtx.currentTime);

noiseSource.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
noiseSource.start();

let lastMouse = {x: 0, y: 0, time: Date.now()};

document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    const dt = now - lastMouse.time;

    const speed = Math.sqrt(dx*dx + dy*dy) / dt; 

    const minFreq = 30;
    const maxFreq = 80;
    const freq = minFreq + (maxFreq - minFreq) * (e.clientX / window.innerWidth);
    baselineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);

    const noiseLevel = 0.01 + 0.03 * (e.clientY / window.innerHeight);
    noiseGain.gain.setTargetAtTime(noiseLevel, audioCtx.currentTime, 0.05);

    if (Math.random() < speed * 0.05) {
        playMicroPattern();
    }

    const pan = (e.clientX / window.innerWidth) * 2 - 1; // -1 to 1
    baselinePanner.pan.setTargetAtTime(pan, audioCtx.currentTime, 0.1);

    lastMouse = {x: e.clientX, y: e.clientY, time: now};
});

function playMicroPattern() {
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
        const delay = Math.random() * 0.2;
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner();

            osc.type = Math.random() < 0.5 ? 'sine' : 'triangle';
            const freq = 100 + Math.random() * 600;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.01 + Math.random() * 0.03, audioCtx.currentTime);

            // Random pan
            panner.pan.setValueAtTime(Math.random() * 2 - 1, audioCtx.currentTime);

            osc.connect(panner).connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1 + Math.random() * 0.2);
        }, delay * 1000);
    }
}

function randomBeeps() {
    const interval = 2000 + Math.random() * 4000; // 2-6 seconds
    setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner();

        osc.type = Math.random() < 0.5 ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(150 + Math.random() * 400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.01 + Math.random() * 0.03, audioCtx.currentTime);
        panner.pan.setValueAtTime(Math.random() * 2 - 1, audioCtx.currentTime);

        osc.connect(panner).connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1 + Math.random() * 0.3);

        randomBeeps(); // schedule next
    }, interval);
}

randomBeeps();

    function countdown() {
  const now = new Date();
  const currentYear = now.getFullYear();
  const targetDate = new Date(currentYear, 8, 22, 10, 0, 0); 

  
  if (now > targetDate) {
    targetDate.setFullYear(currentYear + 1);
  }

  const diffMs = targetDate - now;

  const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diffMs / (1000 * 60)) % 60);
  const seconds = Math.floor((diffMs / 1000) % 60);

 
  const pad = (num) => String(num).padStart(2, '0');

  return { days, hours: pad(hours), minutes: pad(minutes), seconds: pad(seconds) };
}

function updateTimer() {
  const timerDiv = document.querySelector('.timer');
  if (!timerDiv) return; 

  const { days, hours, minutes, seconds } = countdown();
  timerDiv.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}
